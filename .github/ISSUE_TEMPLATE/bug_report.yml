name: Bug Report
description: Report a bug to help improve SunSet
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of SunSet are you running? (check the footer of the web UI, or run `sunset-server --version`)
      placeholder: e.g. v0.2.0, or the commit hash
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: How are you running SunSet?
      multiple: true
      options:
        - Linux (x86_64)
        - Linux (aarch64)
        - Windows
        - Android
        - Built from source
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: When I try to..., the server...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Copy and paste any server logs, browser console errors, or crash reports.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: If applicable, add screenshots or screen recordings to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else? Browser, OS version, network setup, etc.
    validations:
      required: false
